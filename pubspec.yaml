name: mobileanalytics
description: Privacy-first mobile analytics SDK for Flutter. Simple event tracking, offline support, and automatic session management.
version: 0.1.0
homepage: https://github.com/christopherarm/mobileanalytics
repository: https://github.com/christopherarm/mobileanalytics
issue_tracker: https://github.com/christopherarm/mobileanalytics/issues

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.0
  path_provider: ^2.1.0
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.0
  crypto: ^3.0.0
  http: ^1.2.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0
  sqflite_common_ffi: ^2.3.0
