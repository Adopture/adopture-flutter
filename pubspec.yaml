name: adopture
description: >-
  Privacy-first mobile analytics SDK for Flutter. Offline-first event tracking,
  automatic sessions, revenue analytics, and privacy-preserving hashed IDs.
version: 0.1.0
homepage: https://adopture.com
repository: https://github.com/Adopture/adopture-flutter
issue_tracker: https://github.com/Adopture/adopture-flutter/issues
documentation: https://adopture.com/docs

topics:
  - analytics
  - privacy
  - mobile
  - tracking
  - events

platforms:
  android:
  ios:
  macos:

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.0
  path_provider: ^2.1.0
  device_info_plus: ">=11.0.0 <13.0.0"
  package_info_plus: ">=8.0.0 <10.0.0"
  crypto: ^3.0.0
  http: ^1.2.0
  uuid: ^4.5.0
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0
  sqflite_common_ffi: ^2.3.0
